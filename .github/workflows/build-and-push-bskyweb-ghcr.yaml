name: build-and-push-bskyweb-ghcr
on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  bskyweb-container-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_indieapp:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: bskyweb-container-ghcr
    steps:
      - name: Trigger release through webhook
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.DEPLOYMENT_WEBHOOK_TOKEN }}
          repository: ${{ secrets.DEPLOYMENT_WEBHOOK_REPOSITORY }}
          event-type: restart-indieapp

  notify_deployment:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: deploy_indieapp
    steps:
      - name: Wait for successful deployment
        run: sleep 30s

      - name: Notify Discord of successful deployment
        uses: rjstone/discord-webhook-notify@v2
        with:
          webhookUrl: ${{ secrets.DISCORD_WEBHOOK }}
          severity: info
          username: 'Github Actions deployment'
          title: 'Indieapp deployment successful!'
          description: 'Latest indieapp build has been deployed successfully!'
          details: 'Commit: ${{ github.event.head_commit.message }}'
